<form class="tour-selector {{classBlock}}" data-tour-selector>
  <ul
    class="tour-selector__tabs" role="tablist"
    aria-label="Етапи підбору туру">
    <li>
      <button
        class="tour-selector__tab is-active" type="button" role="tab"
        aria-selected="true" data-tab="basic">Основное
      </button>
    </li>
    <li>
      <button
        class="tour-selector__tab" type="button" role="tab"
        aria-selected="false" data-tab="preferences">Предпочтения
      </button>
    </li>
    <li>
      <button
        class="tour-selector__tab" type="button" role="tab"
        aria-selected="false" data-tab="contacts">Контакты
      </button>
    </li>
  </ul>
  <div class="tour-selector__container">
    <div class="tour-selector__panel is-active" data-panel="basic">
      <div class="tour-selector__panel-body">
        <label class="tour-selector__field">
          <span class="tour-selector__label">Направление</span>
          <span class="tour-selector__input-wrap">
          {{> ui/svg className="tour-selector__input-arrow" id="chevron" }}
            <select class="tour-selector__input" data-field="destination">
              <template class="tour-selector__input-template" data-destination-template>
                <option value=""></option>
              </template>
        </select>
          </span>
        </label>
        <label class="tour-selector__field">
          <span class="tour-selector__label">Дата вылета</span>
          <span class="tour-selector__input-wrap">
          {{> ui/svg className="tour-selector__input-arrow" id="chevron" }}
            <select class="tour-selector__input" data-field="date-range">
          <option>25.06.2020 - 10.07.2020</option>
        </select>
        </span>
        </label>
        <label class="tour-selector__field">
          <span class="tour-selector__label">Гости</span>
          <span class="tour-selector__input-wrap">
          {{> ui/svg className="tour-selector__input-arrow" id="chevron" }}
            <select class="tour-selector__input" data-field="guests">
          <option>Взрослых: 2; детей: 5</option>
        </select>
          </span>
        </label>

        <div class="tour-selector__chips" aria-label="Возрастные группы гостей">
          <span class="tour-selector__chip">Взрослых x2</span>
          <span class="tour-selector__chip">15 лет x1</span>
          <span class="tour-selector__chip">3 года x1</span>
          <span class="tour-selector__chip">10 лет x3</span>
        </div>

        <div class="tour-selector__field  tour-selector__field_counter">
          <span class="tour-selector__label">Длительность тура (дней)</span>
          <div class="tour-selector__counter" data-counter>
            <button
              class="tour-selector__counter-btn" type="button"
              data-counter-decrement
              aria-label="Уменьшить количество дней">
              <span></span>
            </button>
            <output
              class="tour-selector__counter-value" data-counter-value>12
            </output>
            <button
              class="tour-selector__counter-btn" type="button"
              data-counter-increment
              aria-label="Увеличить количество дней">
              <span></span>
              <span></span>
            </button>
          </div>
        </div>
      </div>
      <button
        class="tour-selector__btn btn btn_bordered" type="button"
        data-btn-goto="preferences">Дальше
      </button>
    </div>

    <div class="tour-selector__panel" data-panel="preferences" hidden>
      <div class="tour-selector__panel-body">
        <label class="tour-selector__field">
          <span
            class="tour-selector__label">Желаемая цена на одного человека (€)</span>
          <input
            class="tour-selector__input" type="number" inputmode="numeric"
            placeholder="Введите цену" />
        </label>
        <label class="tour-selector__field">
          <span class="tour-selector__label">Питание</span>
          <span class="tour-selector__input-wrap">
          {{> ui/svg className="tour-selector__input-arrow" id="chevron" }}
            <select class="tour-selector__input">
          <option>Без питания</option>
          <option>Завтрак</option>
          <option>Затрак и ужин</option>
          <option>Завтрак, обед, ужин</option>
          <option>Всё включено</option>
          <option>Ультра: всё включено</option>
        </select>
          </span>
        </label>
        <div class="tour-selector__field">
          <span
            class="tour-selector__label">Категория отеля</span>
          <div class="rating tour-selector__rating">
            <div class="rating__items">
              <input
                type="radio" id="star-5" name="hotel_rating" value="5"
                class="rating__input">
              <label for="star-5" class="rating__label">
                {{> ui/svg className="rating__icon" id="star"}}
              </label>

              <input
                type="radio" id="star-4" name="hotel_rating" value="4"
                class="rating__input">
              <label for="star-4" class="rating__label">
                {{> ui/svg className="rating__icon" id="star"}}
              </label>

              <input
                type="radio" id="star-3" name="hotel_rating" value="3"
                class="rating__input">
              <label for="star-3" class="rating__label">
                {{> ui/svg className="rating__icon" id="star"}}
              </label>

              <input
                type="radio" id="star-2" name="hotel_rating" value="2"
                class="rating__input">
              <label for="star-2" class="rating__label">
                {{> ui/svg className="rating__icon" id="star"}}
              </label>

              <input
                type="radio" id="star-1" name="hotel_rating" value="1"
                class="rating__input">
              <label for="star-1" class="rating__label">
                {{> ui/svg className="rating__icon" id="star"}}
              </label>
            </div>
          </div>
        </div>
        <label class="tour-selector__field">
          <span class="tour-selector__label">Пожелания</span>
          <textarea
            class="tour-selector__input tour-selector__input_area"
            placeholder="Ваши пожелания"></textarea>
        </label>
      </div>
        <button
          class="tour-selector__btn btn btn_bordered" type="button"
          data-btn-goto="contacts">Дальше
        </button>
    </div>

    <div class="tour-selector__panel" data-panel="contacts" hidden>
      <div class="tour-selector__panel-body">
        <label class="tour-selector__field">
          <span class="tour-selector__label">Имя</span>
          <input
            class="tour-selector__input" type="text" autocomplete="name"
            placeholder="Введите имя" />
        </label>
        <label class="tour-selector__field">
          <span class="tour-selector__label">Телефон</span>
          <input
            class="tour-selector__input" type="tel" autocomplete="tel"
            placeholder="+380" />
        </label>
        <label class="tour-selector__field">
          <span class="tour-selector__label">Эл. почта</span>
          <input
            class="tour-selector__input" type="email" autocomplete="email"
            placeholder="mail@example.com" />
        </label>
      </div>
        <button
          class="tour-selector__btn btn btn_orange" type="button"
          data-tour-action>подобрать тур
        </button>
    </div>
  </div>
</form>
