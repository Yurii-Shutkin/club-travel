<div class="guests-selector {{guestsSelectorClass}}" data-guests-selector data-select>
  <input type="hidden" name="guests" class="guests-selector__input" data-guests-input />
<div class="guests-selector__trigger-wrap">
  <button type="button" class="guests-selector__trigger" aria-expanded="false" data-select-trigger>
    <span class="guests-selector__value" data-guests-value>
      Взрослых: <span data-guests-adults>2</span>; детей: <span data-guests-children>0</span>
    </span>
    {{> ui/svg className="guests-selector__arrow" id="chevron" dataAttr="data-select-arrow"}}
  </button>

  <div class="guests-selector__dropdown" data-guests-dropdown>
    {{#each guestsRows}}
      <div class="guests-selector__row">
        <span class="guests-selector__label">{{label}}</span>
        {{>ui/counter
          counterClass="guests-selector__counter"
          counterValue=value
          counterType=type
          min=min
          max=max
        }}
      </div>
    {{/each}}
  </div>
</div>
  <div class="guests-selector__chips" data-chips aria-label="Возрастные группы гостей">
    {{#each guestsRows}}
      <span class="guests-selector__chip" data-chip="{{type}}">
        {{this.label}} x<span class="guests-selector__chip-value">{{value}}</span>
      </span>
    {{/each}}
  </div>
</div>
