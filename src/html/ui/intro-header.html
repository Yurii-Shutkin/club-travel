<div class="intro-header {{introHeaderClass}}">
  <div class="intro-header__inner">
    {{#if iconId}}
      {{> ui/svg
        className="intro-header__icon"
        id=iconId
      }}
    {{/if}}

    <{{tag}} class="intro-header__title title">
      {{#if titleOrange}}
        <span class="intro-header__title_orange">{{titleOrange}}</span>
      {{/if}}
      {{titleMain}}
    </{{tag}}>
  </div>
  {{#if subtitle}}
    <p class="intro-header__subtitle">
      {{subtitle}}
    </p>
  {{/if}}
</div>
