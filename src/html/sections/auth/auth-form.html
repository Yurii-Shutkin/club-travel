<section class="main-layout auth-bg">
    <div class="base-form">
        <div class="base-form__container">
            <p class="social-header">Войдите используя соц. сети</p>

            <div class="social-buttons">
                <button type="button" class="btn btn__social btn__social_facebook">
                    {{>ui/svg id="facebook" className="social social-icon"}}
                    Войти с помощью Facebook
                </button>

                <a class="btn btn__social btn__social_google">
                    {{>ui/svg id="google" className="social social-icon"}}
                    Войти с помощью Google
                </a>
            </div>

            <div class="divider">или</div>

            <form data-form="auth" id="form">
                <div class="base-form__input-group">
                    <label class="base-form__label" for="email">E-mail</label>
                    <input class="input-base" type="email" mane="email" id="email" autocomplete="email">
                </div>

                <div class="base-form__input-group">
                    <div class="base-form__label-row">
                        <label class="base-form__label" for="password-login">Пароль</label>
                        <a href="password-recovery.html" class="link-basic">Забыли пароль?</a>
                    </div>
                    <input class="input-base" type="password" id="password-login" name="password-login"
                        id="password-login" autocomplete="current-password">
                </div>

                <div class="base-form__button-row">
                    <a href="signup.html" class="btn btn_bordered">РЕГИСТРАЦИЯ</a>
                    <button type="submit" class="btn btn_orange">ВХОД</button>
                </div>
            </form>

        </div>
        <div class="policy-links">
            <a href="#" class="link-basic link-basic_white">Политика конфиденциальности</a>
            <a href="#" class="link-basic_white">Политика использования</a>
        </div>
    </div>
</section>
