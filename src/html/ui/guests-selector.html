<div
  class="guests-selector {{guestsSelectorClass}}"
  data-guests-selector data-select>
  <input
    type="hidden"
    name="guests"
    class="guests-selector__input"
    data-guests-input />

  <button
    type="button"
    class="guests-selector__trigger"
    aria-expanded="false"
    data-select-trigger>
    <span
      class="guests-selector__value"
      data-guests-value
    >
      Взрослых: 2; детей: 0
    </span>

    {{> ui/svg className="guests-selector__arrow" id="chevron" dataAttr="data-select-arrow"}}
  </button>

  <div
    class="guests-selector__dropdown"
    data-guests-dropdown>

    {{#each guestsRows}}
      <div class="guests-selector__row">
        <span class="guests-selector__label">
          {{label}}
        </span>

        {{>ui/counter
          counterClass="guests-selector__counter"
          counterValue=value
          counterType=type
          min=min
          max=max
          step=step
        }}
      </div>
    {{/each}}

  </div>
</div>
