<div class="swiper-thumbs-container" data-swiper-thumbs-container>
  <div class="swiper-thumbs" data-swiper-thumbs>

    <div class="swiper-thumbs__main-swiper swiper" data-swiper-main>
      <div
        class="swiper-thumbs__main-swiper-wrapper swiper-wrapper"
        data-main-wrap>

      </div>
    </div>

    <div class="swiper-thumbs__list-swiper swiper" aria-label="Фотографії" data-swiper-list>
      <div
        class="swiper-thumbs__list-swiper-wrapper swiper-wrapper"
        data-list-wrap>

      </div>
    </div>

  </div>
  <template data-template="main-slide">
    <div class="swiper-slide swiper-thumbs__main-slide" data-main-slide>
      <picture class="swiper-thumbs__picture">
        <img src="" alt="" data-img>
      </picture>
    </div>
  </template>

  <template data-template="list-slide">
    <div class="swiper-slide swiper-thumbs__list-slide" data-list-slide>
      <button class="swiper-thumbs__list-btn" type="button">
        <img src="" alt="" loading="lazy" data-img>
      </button>
    </div>
  </template>
</div>
