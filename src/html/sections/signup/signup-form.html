<section class="main-layout signup-bg">
    <div class="base-form">
        <div class="base-form__container">
            <p class="social-header">Зарегистрируйтесь используя соц. сети</p>

            <div class="social-buttons">
                <button type="button" class="btn__social btn__social_facebook">
                    {{>ui/svg id="facebook" className="social-icon"}}
                    Войти с помощью Facebook
                </button>

                <button type="button" class="btn__social btn__social_google">
                    {{>ui/svg id="google" className="social-icon"}}
                    Войти с помощью Google
                </button>
            </div>

            <div class="divider">или</div>

            <form data-form="signup" id="form">
                <div class="base-form__input-group">
                    <label class="base-form__label" for="email">E-mail</label>
                    <input class="base-form__input" type="email" name="email" id="email" autocomplete="email">
                </div>

                <div class="base-form__input-group">
                    <label class="base-form__label" for="password">Пароль</label>
                    <input class="base-form__input" type="password" name="password" id="password"
                        autocomplete="new-password">
                </div>

                <div class="base-form__input-group">
                    <label class="base-form__label" for="password-confirm">Повторите пароль</label>
                    <input class="base-form__input" type="password" name="password-confirm" id="password-confirm"
                        autocomplete="new-password">
                </div>

                <div class="base-form__button-row">
                    <a href="auth.html" class="btn btn_bordered">ВХОД</a>
                    <button type="submit" class="btn btn_orange">РЕГИСТРАЦИЯ</button>
                </div>
            </form>

        </div>
        <div class="policy-links">
            <a href="#" class="link-basic link-basic_white">Политика конфиденциальности</a>
            <a href="#" class="link-basic_white">Политика использования</a>
        </div>
    </div>
</section>
