<div class="swiper-thumbs {{swiperThumbsClass}} js-swiper-thumbs">
  <div class="swiper-thumbs__main swiper js-swiper-thumbs-main">
    <div class="swiper-wrapper">
      {{#each swiperThumbsImages}}
        <div class="swiper-thumbs__main-slide swiper-slide">
          {{> ui/picture
            className="swiper-thumbs__picture"
            alt=this.alt
            desktop=this.desktop
            desktopWebp=this.desktopWebp
            mobile=this.mobile
            mobileWebp=this.mobileWebp
          }}
        </div>
      {{/each}}
    </div>
  </div>

  <div class="swiper-thumbs__nav swiper js-swiper-thumbs-nav" aria-label="Фотографии">
    <div class="swiper-wrapper">
      {{#each swiperThumbsImages}}
        <button class="swiper-thumbs__thumb swiper-slide" type="button" aria-label="Показать фото: {{this.alt}}">
          <img src="{{#if this.thumb}}{{this.thumb}}{{else}}{{this.desktop}}{{/if}}" alt="">
        </button>
      {{/each}}
    </div>
  </div>
</div>
