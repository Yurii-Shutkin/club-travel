<section class="main-layout password-recovery__bg">
    <div class="base-form">
        <div class="base-form__container">
            <p class="social-header">Мы отправим специальную ссылку на указанный электронный адрес, перейдя по
                которой вы сможете задать новый пароль.</p>

            <form data-form="password-recovery" id="form">
                <div class="base-form__input-group">
                    <label class="base-form__label" for="email">E-mail</label>
                    <input class="base-form__input" type="email" id="email" name="email" autocomplete="email">
                </div>

                <button type="submit" class="btn btn_orange base-form__btn">отправить</button>
            </form>

        </div>
    </div>
</section>
