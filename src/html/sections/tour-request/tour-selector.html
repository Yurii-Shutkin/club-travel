<section class="tour-selector">
  <div class="container">
    <div class="tour-selector__grid">
      <article class="tour-selector__card">
        <ul class="tour-selector__tabs" aria-label="Крок 1">
          <li class="tour-selector__tab is-active">Основное</li>
          <li class="tour-selector__tab">Предпочтения</li>
          <li class="tour-selector__tab">Контакты</li>
        </ul>

        <label class="tour-selector__field">
          <span class="tour-selector__label">Направление</span>
          <span class="tour-selector__input">Болгария > Золотые пески</span>
        </label>

        <label class="tour-selector__field">
          <span class="tour-selector__label">Дата вылета</span>
          <span class="tour-selector__input">25.06.2020 - 10.07.2020</span>
        </label>

        <label class="tour-selector__field">
          <span class="tour-selector__label">Гости</span>
          <span class="tour-selector__input">Взрослых: 2; детей: 5</span>
        </label>

        <div class="tour-selector__chips">
          <span class="tour-selector__chip">Взрослых x2</span>
          <span class="tour-selector__chip">15 лет x1</span>
          <span class="tour-selector__chip">3 года x1</span>
          <span class="tour-selector__chip">10 лет x3</span>
        </div>

        <label class="tour-selector__field">
          <span class="tour-selector__label">Длительность тура (дней)</span>
          <span class="tour-selector__input tour-selector__input_center">12</span>
        </label>

        <button class="btn tour-selector__btn" type="button">Дальше</button>
      </article>

      <article class="tour-selector__card">
        <ul class="tour-selector__tabs" aria-label="Крок 2">
          <li class="tour-selector__tab">Основное</li>
          <li class="tour-selector__tab is-active">Предпочтения</li>
          <li class="tour-selector__tab">Контакты</li>
        </ul>

        <label class="tour-selector__field">
          <span class="tour-selector__label">Желаемая цена на одного человека (€)</span>
          <span class="tour-selector__input">12</span>
        </label>

        <label class="tour-selector__field">
          <span class="tour-selector__label">Питание</span>
          <span class="tour-selector__input">Завтрак</span>
        </label>

        <div class="tour-selector__field">
          <span class="tour-selector__label">Категория отеля</span>
          <div class="tour-selector__stars" aria-label="Рейтинг 4 із 5">
            <span>★</span><span>★</span><span>★</span><span>★</span><span class="is-muted">★</span>
          </div>
        </div>

        <label class="tour-selector__field">
          <span class="tour-selector__label">Пожелания</span>
          <span class="tour-selector__input tour-selector__input_area"></span>
        </label>

        <button class="btn tour-selector__btn" type="button">Дальше</button>
      </article>

      <article class="tour-selector__card">
        <ul class="tour-selector__tabs" aria-label="Крок 3">
          <li class="tour-selector__tab">Основное</li>
          <li class="tour-selector__tab">Предпочтения</li>
          <li class="tour-selector__tab is-active">Контакты</li>
        </ul>

        <label class="tour-selector__field">
          <span class="tour-selector__label">Имя</span>
          <span class="tour-selector__input"></span>
        </label>

        <label class="tour-selector__field">
          <span class="tour-selector__label">Телефон</span>
          <span class="tour-selector__input"></span>
        </label>

        <label class="tour-selector__field">
          <span class="tour-selector__label">Эл. почта</span>
          <span class="tour-selector__input"></span>
        </label>

        <button class="btn btn_orange tour-selector__btn tour-selector__btn_orange" type="button">
          Подобрать тур
        </button>
      </article>
    </div>
  </div>
</section>
