<div
  class="counter {{counterClass}}" data-counter="{{counterType}}">
  <button class="counter__btn" type="button" data-counter-decrement>
    <span></span>
  </button>

  <output class="counter__value" data-counter-value>{{counterValue}}</output>

  <button class="counter__btn" type="button" data-counter-increment>
    <span></span>
    <span></span>
  </button>
</div>
