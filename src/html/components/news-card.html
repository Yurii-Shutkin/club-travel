<div class="{{className}} news-card" data-card>
  <div class="news-card__picture-wrap">
    <div class="news-card__price-badge" data-card-price>
      от <span>509</span>€
    </div>

    <div class="news-card__meta" data-card-date>
      {{> ui/svg
        className="news-card__meta-icon"
        id="clock"
      }}
      <span class="news-card__meta-item"></span>
    </div>

    <picture class="news-card__picture">
      <img
        src="/src/assets/image/test.webp"
        alt="{{img}}"
        data-card-img>
    </picture>
  </div>

  <div class="news-card__content">
        <span class="news-card__title" data-card-title>

        </span>
  </div>
</div>
