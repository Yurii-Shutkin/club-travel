<div class="swiper-thumbs {{swiperThumbsClass}} js-swiper-thumbs">
  <div class="swiper-thumbs__main swiper js-swiper-thumbs-main">
    <div class="swiper-wrapper">
      {{#each (split swiperThumbsImages)}}
        <div class="swiper-thumbs__main-slide swiper-slide">
          {{> ui/picture
            className="swiper-thumbs__picture"
            alt=../swiperThumbsAlt
            desktop=this
            desktopWebp=(lookup (split ../swiperThumbsImagesWebp) @index)
          }}
        </div>
      {{/each}}
    </div>
  </div>

  <div class="swiper-thumbs__nav swiper js-swiper-thumbs-nav" aria-label="Фотографии">
    <div class="swiper-wrapper">
      {{#each (split swiperThumbsImages)}}
        <button class="swiper-thumbs__thumb swiper-slide" type="button" aria-label="Показать фото: {{../swiperThumbsAlt}}">
          <img src="{{this}}" alt="">
        </button>
      {{/each}}
    </div>
  </div>
</div>
