<div class="info-list {{infoListClass}}">
{{#if title}}
    <{{default titleTag "p"}} class="info-list__title">
  {{title}}
  </{{default titleTag "p"}}>
{{/if}}

{{#if items}}
  <ul class="info-list__list">
    {{#each (split items)}}
      <li class="info-list__item">{{this}}</li>
    {{/each}}
  </ul>
{{/if}}

</div>
